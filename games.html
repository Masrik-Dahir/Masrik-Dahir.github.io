                        <button onclick="document.getElementById('game-search-input').value='';document.getElementById('game-search-input').dispatchEvent(new Event('input'))" style="margin-left: 40px; background: transparent; border: none; cursor: pointer;">
                            ✖️
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
