    <style>
        .tag {
            text-align: center;
            width: 100%;
        }
        .it {
            font-size: 24px;
            font-weight: bold;
        }
        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .image-container img {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .inactive-image {
            width: 150px;
        }
        .inactive-image:hover {
            transform: scale(1.1);
            z-index: 2;
        }
        .active-image {
            width: 100%;
        }
        .active-image img {
            transition: none;
        }
        .inactive-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .inactive-container .image-container {
            flex: 1 1 150px;
        }

        /* ✅ BIGGER SLIDESHOW AREA (height increased) */
        #showSlide {
            height: 80vh;          /* <-- increase/decrease this number to taste */
            min-height: 80vh;
        }
        #showSlide .content-slide {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #showSlide .content-slide img {
            max-height: 80vh;      /* keeps image inside the taller slideshow */
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ✅ FIXED DOT BAR UNDER MENU */
        .content-dot-container-frame {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            top: 55px;               /* ✅ directly under desktop menu */

            width: 100vw;
            max-width: none;
            margin: 0;
            border-radius: 0;
            z-index: 9998;

            background: transparent;
            backdrop-filter: blur(6px);
        }

        /* ✅ force the TABLE to center its contents */
        .content-dot-container-frame table {
            width: auto !important;
            margin: 0 auto !important;
            border-collapse: collapse;
        }

        /* ✅ make the button row a true centered flex row */
        .content-dot-container {
            width: 100% !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            flex-wrap: wrap;
            gap: 8px;
            text-align: center;
            background: transparent;
            border: none;
        }

        /* ✅ kill any floats inside the nav row */
        .content-dot-container * {
            float: none !important;
        }

        /* Optional nicer desktop floating bar */
        @media (min-width: 1026px) {
            .content-dot-container-frame {
                max-width: fit-content;
                margin: 0 auto;
                transform: translateX(-50%);
                border-radius: 14px;
            }
        }

        /* ✅ MOBILE FIX: prevent end buttons clipping */
        @media (max-width: 1025px) {

            ..content-dot-container-frame {
                left: 50% !important;
                transform: translateX(-50%) !important;
                width: 100%;
                max-width: 100%;

                box-sizing: border-box !important;

                overflow: visible !important; /* don't clip children */
                margin: 0;
                background: transparent;
                border-radius: 10px;
                backdrop-filter: blur(6px);
                box-shadow: 0 -0px 0px rgba(0,0,0,0);
            }

            .content-dot-container {
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                white-space: nowrap !important;

                justify-content: flex-start !important; /* ✅ start at left so ends show */
                align-items: center !important;

                gap: 0px !important;
                -webkit-overflow-scrolling: touch;

                /* extra scroll padding so last/first button can fully appear */
                padding: 0 0px !important;
                scroll-padding-left: 0px;
                scroll-padding-right: 0px;
            }

            .content-dot-container > * {
                flex: 0 0 auto !important;
            }

            .content-dot-container::-webkit-scrollbar { height: 0px; }
            .content-dot-container { scrollbar-width: none; }
        }

    </style>

<script>
    function togglePopup(id) {
        var popup = document.getElementById('popup-' + id);
        popup.classList.toggle('active');
    }
    function closePopup(id) {
        var popup = document.getElementById('popup-' + id);
        popup.classList.remove('active');
    }
    document.querySelectorAll('.overlay').forEach(overlay => {
        overlay.addEventListener('click', function() {
            const popup = this.parentElement;
            popup.classList.remove('active');
        });
    });
</script>

<!-- ✅ Gallery-first + manual slideshow start -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        showGalById();     // gallery first
        initializeSlides(); // prep slides but don't auto-run
    });

    var slides = document.getElementsByClassName("content-slide");
    var sla = document.getElementById("showSlide");
    var gal = document.getElementById("showGal");

    var slideIndex = 1;
    var slideInterval = null;

    function showSlideById() {
        console.log("Show Slide Button Clicked");
        sla.style.display = "block";
        gal.style.display = "none";
        startSlideShow();
    }

    function showGalById() {
        console.log("Show Gallery Button Clicked");
        gal.style.display = "block";
        sla.style.display = "none";
        stopSlideShow();
    }

    function initializeSlides() {
        for (var i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";
        }
    }

    function changeSlide(n) {
        showSlides(slideIndex += n);
    }

    function nextSlide() { changeSlide(1); }
    function prevSlide() { changeSlide(-1); }
    function currentSlide(n) { showSlides(slideIndex = n); }

    function showSlides(n) {
        var i;
        var dots = document.getElementsByClassName("content-dot");

        if (n > slides.length) { slideIndex = 1; }
        if (n < 1) { slideIndex = slides.length; }

        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";
        }
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" content-active-dot", "");
        }

        slides[slideIndex - 1].style.display = "block";
        if (dots[slideIndex - 1]) {
            dots[slideIndex - 1].className += " content-active-dot";
        }
    }

    function startSlideShow() {
        stopSlideShow();
        initializeSlides();
        showSlides(slideIndex);
        slideInterval = setInterval(function () {
            changeSlide(1);
        }, 2000);
    }

    function stopSlideShow() {
        if (slideInterval) {
            clearInterval(slideInterval);
            slideInterval = null;
        }
    }

    function pauseSlideShow() { stopSlideShow(); }
    function resumeSlideShow() { startSlideShow(); }
</script>
</html>
