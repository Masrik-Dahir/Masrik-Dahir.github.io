<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="md-arcade-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0521"/>
    </linearGradient>
    <linearGradient id="md-arcade-scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- CRT-style dark background -->
  <rect width="800" height="120" fill="url(#md-arcade-bg)"/>

  <!-- Scanline overlay -->
  <pattern id="md-arcade-lines" width="800" height="4" patternUnits="userSpaceOnUse">
    <rect width="800" height="2" fill="transparent"/>
    <rect y="2" width="800" height="2" fill="#ffffff" opacity="0.02"/>
  </pattern>
  <rect width="800" height="120" fill="url(#md-arcade-lines)"/>

  <!-- Falling Tetris-like pixel blocks (left side) -->
  <rect x="30" y="-10" width="8" height="8" fill="#ff4444" rx="1">
    <animate attributeName="y" values="-10;130" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="45" y="-25" width="8" height="8" fill="#44ff44" rx="1">
    <animate attributeName="y" values="-25;130" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="60" y="-15" width="8" height="8" fill="#4488ff" rx="1">
    <animate attributeName="y" values="-15;130" dur="3.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="80" y="-30" width="8" height="8" fill="#ffff44" rx="1">
    <animate attributeName="y" values="-30;130" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2" dur="4.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Pac-Man ghost (left) -->
  <g opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
    <path d="M108,75 Q108,65 118,65 Q128,65 128,75 L128,85 L125,82 L122,85 L118,82 L114,85 L111,82 L108,85 Z" fill="#ff6666">
      <animate attributeName="d" values="M108,75 Q108,65 118,65 Q128,65 128,75 L128,85 L125,82 L122,85 L118,82 L114,85 L111,82 L108,85 Z;M108,75 Q108,65 118,65 Q128,65 128,75 L128,85 L126,83 L123,86 L118,83 L113,86 L110,83 L108,85 Z;M108,75 Q108,65 118,65 Q128,65 128,75 L128,85 L125,82 L122,85 L118,82 L114,85 L111,82 L108,85 Z" dur="0.6s" repeatCount="indefinite"/>
    </path>
    <circle cx="114" cy="72" r="2.5" fill="white"/>
    <circle cx="122" cy="72" r="2.5" fill="white"/>
    <circle cx="115" cy="72" r="1.2" fill="#1a0a2e"/>
    <circle cx="123" cy="72" r="1.2" fill="#1a0a2e"/>
  </g>

  <!-- Space invader (right side) -->
  <g opacity="0.5" transform="translate(690, 70)">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite"/>
    <rect x="4" y="0" width="4" height="4" fill="#44ff88"/>
    <rect x="12" y="0" width="4" height="4" fill="#44ff88"/>
    <rect x="2" y="4" width="4" height="4" fill="#44ff88"/>
    <rect x="6" y="4" width="4" height="4" fill="#44ff88"/>
    <rect x="10" y="4" width="4" height="4" fill="#44ff88"/>
    <rect x="14" y="4" width="4" height="4" fill="#44ff88"/>
    <rect x="0" y="8" width="4" height="4" fill="#44ff88"/>
    <rect x="4" y="8" width="4" height="4" fill="#44ff88"/>
    <rect x="8" y="8" width="4" height="4" fill="#44ff88"/>
    <rect x="12" y="8" width="4" height="4" fill="#44ff88"/>
    <rect x="16" y="8" width="4" height="4" fill="#44ff88"/>
    <rect x="0" y="12" width="4" height="4" fill="#44ff88"/>
    <rect x="8" y="12" width="4" height="4" fill="#44ff88"/>
    <rect x="16" y="12" width="4" height="4" fill="#44ff88"/>
    <rect x="2" y="16" width="4" height="4" fill="#44ff88"/>
    <rect x="14" y="16" width="4" height="4" fill="#44ff88"/>
    <animateTransform attributeName="transform" type="translate" values="690,70;690,65;690,70" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Falling pixel blocks (right side) -->
  <rect x="720" y="-20" width="8" height="8" fill="#ff44ff" rx="1">
    <animate attributeName="y" values="-20;130" dur="3.8s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2" dur="3.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="740" y="-10" width="8" height="8" fill="#44ffff" rx="1">
    <animate attributeName="y" values="-10;130" dur="4.2s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3" dur="4.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="760" y="-35" width="8" height="8" fill="#ff8844" rx="1">
    <animate attributeName="y" values="-35;130" dur="5.2s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2" dur="5.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Snake body segment (bottom left) -->
  <g opacity="0.5">
    <rect x="20" y="100" width="6" height="6" rx="1" fill="#44ff44"/>
    <rect x="28" y="100" width="6" height="6" rx="1" fill="#33dd33"/>
    <rect x="36" y="100" width="6" height="6" rx="1" fill="#22bb22"/>
    <rect x="44" y="100" width="6" height="6" rx="1" fill="#119911"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Pong ball bouncing -->
  <circle cx="150" cy="30" r="3" fill="#ffffff" opacity="0.4">
    <animate attributeName="cx" values="150;170;150" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;100;30" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Text backdrop -->
  <rect x="200" y="25" width="400" height="72" rx="8" fill="#0d0521" opacity="0.7"/>
  <rect x="200" y="25" width="400" height="72" rx="8" fill="none" stroke="#ff44ff" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Project name text -->
  <text x="400" y="55" font-family="'Segoe UI',sans-serif" font-size="30" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="4">
    masrikdahir.com<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="82" font-family="'Segoe UI',sans-serif" font-size="12"
        fill="#ff88ff" text-anchor="middle" letter-spacing="1">
    Portfolio, travel atlas, and 99-game retro arcade<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>