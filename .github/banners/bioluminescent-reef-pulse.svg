<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="md-reef-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#061224"/>
    </linearGradient>
    <radialGradient id="md-reef-glow1" cx="0.2" cy="0.6" r="0.25">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="md-reef-glow2" cx="0.7" cy="0.4" r="0.2">
      <stop offset="0%" stop-color="#ff6bdf" stop-opacity="0.5">
        <animate attributeName="stop-opacity" values="0.5;0.15;0.5" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff6bdf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="md-reef-glow3" cx="0.5" cy="0.7" r="0.18">
      <stop offset="0%" stop-color="#4dabff" stop-opacity="0.5">
        <animate attributeName="stop-opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4dabff" stop-opacity="0"/>
    </radialGradient>
    <filter id="md-reef-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Deep ocean background -->
  <rect width="800" height="120" fill="url(#md-reef-bg)"/>

  <!-- Bioluminescent glow areas -->
  <rect width="800" height="120" fill="url(#md-reef-glow1)"/>
  <rect width="800" height="120" fill="url(#md-reef-glow2)"/>
  <rect width="800" height="120" fill="url(#md-reef-glow3)"/>

  <!-- Floating plankton particles -->
  <circle cx="80" cy="30" r="1.5" fill="#00ffcc" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;20;30" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="90" r="1" fill="#ff6bdf" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="90;78;90" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="15" r="1.2" fill="#4dabff" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="15;8;15" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="100" r="1.8" fill="#00ffcc" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;88;100" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="40" r="1" fill="#ff6bdf" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;30;40" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="730" cy="80" r="1.5" fill="#4dabff" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;68;80" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="55" r="0.8" fill="#00ffcc" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="55;45;55" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="65" r="1.3" fill="#b08fff" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="65;55;65" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="20" r="1" fill="#b08fff" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="2.6s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="20;12;20" dur="3.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Coral reef silhouettes at bottom -->
  <path d="M0,110 Q30,95 50,105 Q70,85 100,100 Q120,90 140,105 Q165,80 190,100 Q210,92 230,105 Q260,88 280,102 Q300,78 330,98 Q350,90 380,105 Q400,85 430,100 Q455,75 480,98 Q500,88 530,105 Q555,82 580,100 Q600,90 630,105 Q660,80 690,100 Q710,92 740,105 Q765,85 800,100 L800,120 L0,120 Z" fill="#061018" opacity="0.7"/>
  <path d="M0,115 Q40,105 80,112 Q120,100 160,110 Q200,95 240,108 Q280,100 320,112 Q360,95 400,110 Q440,98 480,112 Q520,95 560,108 Q600,100 640,112 Q680,98 720,110 Q760,102 800,108 L800,120 L0,120 Z" fill="#08101e" opacity="0.8"/>

  <!-- Pulsing anemone tendrils -->
  <g filter="url(#md-reef-blur)">
    <line x1="120" y1="115" x2="115" y2="95" stroke="#00ffcc" stroke-width="1.5" opacity="0.4">
      <animate attributeName="x2" values="115;125;115" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="125" y1="115" x2="128" y2="92" stroke="#00ffcc" stroke-width="1" opacity="0.3">
      <animate attributeName="x2" values="128;118;128" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="680" y1="112" x2="675" y2="90" stroke="#ff6bdf" stroke-width="1.5" opacity="0.4">
      <animate attributeName="x2" values="675;685;675" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="685" y1="112" x2="690" y2="88" stroke="#ff6bdf" stroke-width="1" opacity="0.3">
      <animate attributeName="x2" values="690;680;690" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Text overlay background -->
  <rect x="180" y="28" width="440" height="68" rx="10" fill="#000000" opacity="0.4"/>

  <!-- Author text -->
  <text x="400" y="56" font-family="'Segoe UI',sans-serif" font-size="27" font-weight="700"
        fill="#e0f4ff" text-anchor="middle" letter-spacing="3">
    Masrik Dahir<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="400" y="82" font-family="'Segoe UI',sans-serif" font-size="13"
        fill="#00ffcc" text-anchor="middle" letter-spacing="2">
    ✦ masrikdahir.com ✦<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>
</svg>