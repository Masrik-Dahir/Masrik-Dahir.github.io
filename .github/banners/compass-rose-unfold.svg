<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="compass-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#132744"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="compass-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#d4973b"/>
    </linearGradient>
    <radialGradient id="compass-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#compass-bg)"/>

  <!-- Latitude lines -->
  <g opacity="0">
    <line x1="0" y1="30" x2="800" y2="30" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="0" y1="60" x2="800" y2="60" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="0" y1="90" x2="800" y2="90" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <animate attributeName="opacity" values="0;0.6" dur="2s" fill="freeze"/>
  </g>

  <!-- Longitude lines -->
  <g opacity="0">
    <line x1="100" y1="0" x2="100" y2="120" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="200" y1="0" x2="200" y2="120" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="300" y1="0" x2="300" y2="120" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="500" y1="0" x2="500" y2="120" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="600" y1="0" x2="600" y2="120" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <line x1="700" y1="0" x2="700" y2="120" stroke="#2a4a70" stroke-width="0.5" stroke-dasharray="4,8"/>
    <animate attributeName="opacity" values="0;0.6" dur="2s" begin="0.3s" fill="freeze"/>
  </g>

  <!-- Compass rose center glow -->
  <circle cx="110" cy="60" r="45" fill="url(#compass-glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </circle>

  <!-- Compass rose - North pointer -->
  <polygon points="110,18 115,55 105,55" fill="url(#compass-gold)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.5s" fill="freeze"/>
  </polygon>
  <!-- South pointer -->
  <polygon points="110,102 115,65 105,65" fill="#8ba4c4" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.7s" fill="freeze"/>
  </polygon>
  <!-- East pointer -->
  <polygon points="152,60 115,55 115,65" fill="#8ba4c4" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.9s" fill="freeze"/>
  </polygon>
  <!-- West pointer -->
  <polygon points="68,60 105,55 105,65" fill="url(#compass-gold)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.1s" fill="freeze"/>
  </polygon>

  <!-- NE pointer -->
  <polygon points="140,30 118,53 112,47" fill="#6889ae" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.3s" fill="freeze"/>
  </polygon>
  <!-- SE pointer -->
  <polygon points="140,90 118,67 112,73" fill="#6889ae" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.4s" fill="freeze"/>
  </polygon>
  <!-- SW pointer -->
  <polygon points="80,90 102,67 108,73" fill="#6889ae" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.5s" fill="freeze"/>
  </polygon>
  <!-- NW pointer -->
  <polygon points="80,30 102,53 108,47" fill="#6889ae" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.6s" fill="freeze"/>
  </polygon>

  <!-- Compass center circle -->
  <circle cx="110" cy="60" r="6" fill="#0a1628" stroke="url(#compass-gold)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
  </circle>
  <circle cx="110" cy="60" r="2" fill="url(#compass-gold)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
  </circle>

  <!-- Compass outer ring -->
  <circle cx="110" cy="60" r="48" fill="none" stroke="url(#compass-gold)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="1.2s" begin="0.3s" fill="freeze"/>
  </circle>

  <!-- Cardinal letters -->
  <text x="110" y="14" font-family="'Segoe UI',sans-serif" font-size="8" fill="#f0c040" text-anchor="middle" font-weight="700" opacity="0">N<animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.8s" fill="freeze"/></text>
  <text x="110" y="116" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8ba4c4" text-anchor="middle" font-weight="700" opacity="0">S<animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.9s" fill="freeze"/></text>
  <text x="159" y="64" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8ba4c4" text-anchor="middle" font-weight="700" opacity="0">E<animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.0s" fill="freeze"/></text>
  <text x="61" y="64" font-family="'Segoe UI',sans-serif" font-size="8" fill="#f0c040" text-anchor="middle" font-weight="700" opacity="0">W<animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.1s" fill="freeze"/></text>

  <!-- Traveling dots on latitude lines -->
  <circle cx="0" cy="30" r="2" fill="#f0c040" opacity="0.7">
    <animate attributeName="cx" values="170;800" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="90" r="1.5" fill="#8ba4c4" opacity="0.5">
    <animate attributeName="cx" values="170;800" dur="5s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dark overlay behind text for readability -->
  <rect x="200" y="28" width="440" height="65" rx="8" fill="#000000" opacity="0.4"/>

  <!-- Author name -->
  <text x="420" y="55" font-family="'Segoe UI',sans-serif" font-size="27" font-weight="700"
        fill="#f0c040" text-anchor="middle" letter-spacing="3" opacity="0">
    Masrik Dahir<animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Website -->
  <text x="420" y="80" font-family="'Segoe UI',sans-serif" font-size="13"
        fill="#8ba4c4" text-anchor="middle" letter-spacing="2" opacity="0">
    &#10022; masrikdahir.com &#10022;<animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Subtle star decorations -->
  <circle cx="680" cy="20" r="1" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0.3;0.8" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="45" r="0.8" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0.2;0.6" dur="4s" begin="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="95" r="1.2" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0.3;0.7" dur="3.5s" begin="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="75" r="0.7" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0.2;0.5" dur="4.5s" begin="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="770" cy="100" r="0.9" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0.1;0.6" dur="3.8s" begin="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
