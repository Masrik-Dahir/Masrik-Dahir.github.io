<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="mdh-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f3"/>
      <stop offset="100%" stop-color="#e4e5ea"/>
    </linearGradient>
    <linearGradient id="mdh-nav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
    <linearGradient id="mdh-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="mdh-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#6b6b6b"/>
    </linearGradient>
    <linearGradient id="mdh-playercar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>

  <!-- Browser chrome -->
  <rect width="960" height="540" rx="8" fill="#e4e5ea"/>
  <rect width="960" height="36" rx="8" fill="url(#mdh-chrome)"/>
  <rect y="28" width="960" height="8" fill="url(#mdh-chrome)"/>

  <!-- Window buttons -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28ca41"/>

  <!-- URL bar -->
  <rect x="90" y="8" width="780" height="20" rx="4" fill="#ffffff"/>
  <text x="105" y="22" font-family="'Segoe UI',sans-serif" font-size="10" fill="#666">
    www.masrikdahir.com/games
  </text>

  <!-- Page content area -->
  <rect x="0" y="36" width="960" height="504" fill="#ffffff"/>

  <!-- Navigation bar -->
  <rect x="0" y="36" width="960" height="32" fill="url(#mdh-nav)" stroke="#000000" stroke-width="0" />
  <line x1="0" y1="68" x2="960" y2="68" stroke="#222" stroke-width="1.5"/>

  <!-- Nav items -->
  <text x="120" y="56" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Home</text>
  <text x="230" y="56" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Career</text>
  <text x="350" y="56" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Academia</text>
  <text x="470" y="56" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Software</text>
  <text x="590" y="56" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Milestones</text>
  <text x="700" y="56" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#000" text-anchor="middle">Travel</text>
  <text x="800" y="56" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#ff0000" text-anchor="middle">Games</text>

  <!-- Game canvas area - Night Racer -->
  <rect x="80" y="80" width="800" height="400" rx="6" fill="url(#mdh-sky)" stroke="#222" stroke-width="2"/>

  <!-- Stars in sky -->
  <circle cx="150" cy="110" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="280" cy="95" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="420" cy="105" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="560" cy="90" r="1.3" fill="#ffffff" opacity="0.8"/>
  <circle cx="700" cy="100" r="0.9" fill="#ffffff" opacity="0.5"/>
  <circle cx="780" cy="115" r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="130" r="0.7" fill="#ffffff" opacity="0.4"/>
  <circle cx="650" cy="125" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="350" cy="118" r="1" fill="#ffffff" opacity="0.7"/>

  <!-- Moon -->
  <circle cx="750" cy="110" r="18" fill="#f5f5dc"/>
  <circle cx="743" cy="106" r="4" fill="#ddddc8" opacity="0.4"/>
  <circle cx="758" cy="114" r="2.5" fill="#ddddc8" opacity="0.3"/>

  <!-- Mountains silhouette -->
  <polygon points="80,230 120,180 180,200 240,165 300,195 360,170 420,190 480,160 540,185 600,175 660,190 720,165 780,185 830,195 880,175 880,230" fill="#1a1a3a"/>
  <polygon points="80,240 140,205 210,220 290,195 370,215 450,200 530,215 610,198 690,210 750,200 820,218 880,205 880,240" fill="#252545"/>

  <!-- Green grass area -->
  <rect x="80" y="235" width="800" height="245" fill="#10aa10"/>
  <rect x="80" y="235" width="800" height="10" fill="#009a00"/>

  <!-- Road (perspective trapezoid) -->
  <polygon points="320,240 640,240 700,480 260,480" fill="#636363"/>

  <!-- Road rumble strips -->
  <polygon points="315,240 320,240 260,480 250,480" fill="#ff2222"/>
  <polygon points="640,240 645,240 710,480 700,480" fill="#ff2222"/>

  <!-- Lane markers -->
  <line x1="420" y1="250" x2="380" y2="320" stroke="#cccccc" stroke-width="2" stroke-dasharray="8,12"/>
  <line x1="540" y1="250" x2="580" y2="320" stroke="#cccccc" stroke-width="2" stroke-dasharray="8,12"/>
  <line x1="380" y1="320" x2="340" y2="400" stroke="#cccccc" stroke-width="2" stroke-dasharray="8,12"/>
  <line x1="580" y1="320" x2="620" y2="400" stroke="#cccccc" stroke-width="2" stroke-dasharray="8,12"/>

  <!-- Trees left side -->
  <rect x="150" y="260" width="5" height="25" fill="#5c3d2e"/>
  <circle cx="152" cy="252" r="12" fill="#0d7a0d"/>
  <circle cx="148" cy="248" r="10" fill="#11aa11"/>

  <rect x="190" y="290" width="4" height="20" fill="#5c3d2e"/>
  <circle cx="192" cy="284" r="10" fill="#0d7a0d"/>
  <circle cx="189" cy="280" r="8" fill="#11aa11"/>

  <!-- Trees right side -->
  <rect x="760" y="255" width="5" height="25" fill="#5c3d2e"/>
  <circle cx="762" cy="248" r="12" fill="#0d7a0d"/>
  <circle cx="758" cy="244" r="10" fill="#11aa11"/>

  <rect x="720" y="280" width="4" height="20" fill="#5c3d2e"/>
  <circle cx="722" cy="274" r="10" fill="#0d7a0d"/>

  <!-- Traffic car (blue) -->
  <rect x="430" y="280" width="30" height="18" rx="3" fill="#3333ff"/>
  <rect x="435" y="282" width="20" height="6" rx="1" fill="rgba(150,200,255,0.6)"/>
  <rect x="427" y="282" width="4" height="8" rx="1" fill="#111"/>
  <rect x="459" y="282" width="4" height="8" rx="1" fill="#111"/>

  <!-- Traffic car (yellow) -->
  <rect x="545" y="340" width="38" height="22" rx="3" fill="#ffcc00"/>
  <rect x="551" y="343" width="26" height="7" rx="1" fill="rgba(150,200,255,0.6)"/>
  <rect x="541" y="344" width="5" height="10" rx="1" fill="#111"/>
  <rect x="582" y="344" width="5" height="10" rx="1" fill="#111"/>

  <!-- Player car at bottom center -->
  <g>
    <!-- Car body -->
    <path d="M 440,430 L 450,395 Q 460,388 480,388 Q 500,388 510,395 L 520,430 Q 510,435 480,435 Q 450,435 440,430 Z" fill="url(#mdh-playercar)"/>
    <!-- Racing stripe -->
    <rect x="476" y="390" width="8" height="42" fill="rgba(255,255,255,0.2)" rx="1"/>
    <!-- Windshield -->
    <path d="M 457,413 Q 462,400 480,398 Q 498,400 503,413 Z" fill="rgba(100,180,255,0.7)"/>
    <!-- Headlights -->
    <circle cx="455" cy="393" r="3" fill="#ffffcc"/>
    <circle cx="505" cy="393" r="3" fill="#ffffcc"/>
    <!-- Taillights -->
    <circle cx="448" cy="432" r="3" fill="#ff2200"/>
    <circle cx="512" cy="432" r="3" fill="#ff2200"/>
    <!-- Wheels -->
    <rect x="435" y="398" width="6" height="12" rx="2" fill="#111"/>
    <rect x="519" y="398" width="6" height="12" rx="2" fill="#111"/>
    <rect x="433" y="425" width="6" height="12" rx="2" fill="#111"/>
    <rect x="521" y="425" width="6" height="12" rx="2" fill="#111"/>
    <!-- Exhaust glow -->
    <ellipse cx="465" cy="440" rx="4" ry="5" fill="rgba(255,100,0,0.5)"/>
    <ellipse cx="495" cy="440" rx="4" ry="5" fill="rgba(255,100,0,0.5)"/>
  </g>

  <!-- Speed lines overlay -->
  <line x1="350" y1="260" x2="348" y2="290" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="600" y1="270" x2="603" y2="300" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="420" y1="255" x2="416" y2="285" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- NIGHT RACER title on canvas -->
  <text x="480" y="165" font-family="'Courier New',monospace" font-size="36" font-weight="700" fill="#ff2222" text-anchor="middle" letter-spacing="3">NIGHT RACER</text>
  <text x="480" y="185" font-family="'Courier New',monospace" font-size="14" fill="#ffcc00" text-anchor="middle" letter-spacing="2">RETRO EDITION</text>
  <text x="480" y="215" font-family="'Courier New',monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">PRESS ENTER OR TAP TO START</text>

  <!-- HUD below canvas -->
  <text x="120" y="496" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#222">SCORE: 4,250</text>
  <text x="420" y="496" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#222">SPEED: 287 km/h</text>
  <text x="720" y="496" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#222">TIME: 45.2s</text>

  <!-- Controls hint -->
  <text x="480" y="520" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle">Arrow / WASD: Accelerate, Brake, Left, Right</text>
</svg>
