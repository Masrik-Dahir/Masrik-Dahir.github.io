    <style>
        /* ═══════════════════════════════════════════════════════════
           UNIVERSAL LIQUID-GLASS NORM
           Same model used by every widget-tooltip button on index.html:
           – hex-outline shimmer on ::before
           – rotating conic-gradient border on the button itself
           – sweeping white glint as another background layer
           – fully frosted backdrop-filter
           Active (expanded) rows get a GOLDEN background.
           ═══════════════════════════════════════════════════════════ */
        @property --rcn-edge-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }
        @property --rcn-glint-pos {
            syntax: '<percentage>';
            initial-value: -25%;
            inherits: false;
        }
        @keyframes tt-hex-sweep      { from { background-position: 0% 50%; } to { background-position: 200% 50%; } }
        @keyframes tt-hex-hue-cycle  {
            from { filter: saturate(1.25) brightness(1.05) hue-rotate(  0deg); }
            to   { filter: saturate(1.25) brightness(1.05) hue-rotate(360deg); }
        }
        @keyframes tt-rcn-edge-spin  { to { --rcn-edge-angle: 360deg; } }
        @keyframes tt-rcn-glint      { 0% { --rcn-glint-pos: -25%; } 100% { --rcn-glint-pos: 125%; } }
        @keyframes tt-active-shimmer {
            0%, 100% { filter: saturate(1.30) brightness(0.95) hue-rotate(-15deg); }
            50%      { filter: saturate(1.90) brightness(1.30) hue-rotate( 15deg); }
        }

        /* ── .pretty row toggle buttons ── always-on liquid glass:
           the conic-gradient border rotates 24/7 (so the EDGE always
           glistens), and on hover the interior hex mesh + halos
           kick in too. */
        body.polish #app_academia .pretty {
            display: block;
            width: 100%;
            text-align: left;
            margin: 6px 0 0;
            padding: 10px 14px;
            border-radius: 10px;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            /* Bigger hexes for the wider academia row buttons — 12px
               gives ~50-80 columns × 4 rows at this width, large
               enough to clearly see the geometry shimmering. */
            --hex-size: 12px;
            --rcn-edge-angle: 0deg;
            --rcn-glint-pos: -25%;
            color: rgba(10,10,25,0.92);
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            cursor: pointer;
            /* Single-layer white liquid-glass surface — NO rotating
               rainbow border (user wanted that removed). The border
               is a quiet neutral line so the surface reads as a
               calm plain glass tile. */
            background: linear-gradient(135deg,
                rgba(255,255,255,0.94) 0%,
                rgba(248,250,255,0.90) 100%) !important;
            border: 1px solid rgba(200,210,225,0.55) !important;
            backdrop-filter: blur(6px) saturate(130%) !important;
            -webkit-backdrop-filter: blur(6px) saturate(130%) !important;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 1px 3px rgba(15,20,40,0.08) !important;
            transition: border-radius 0.18s ease, transform 0.18s ease,
                        box-shadow 0.22s ease, color 0.22s ease,
                        border-color 0.22s ease;
            animation: none !important;
        }
        /* Hex shimmer layer on the .pretty button itself. !important
           used throughout because polish.css applies its own ::before
           styles with !important to this button and would otherwise
           win the cascade. */
        body.polish #app_academia .pretty::before {
            content: '' !important;
            position: absolute !important;
            inset: 0 !important;
            z-index: -1 !important;
            pointer-events: none !important;
            border-radius: inherit !important;
            background: linear-gradient(90deg,
                #ffb3c6 0%, #ffd1a8 14%, #fff0a8 28%, #c4f2c5 42%,
                #b8d9ff 56%, #d4c1ff 70%, #ffc1e5 85%, #ffb3c6 100%) !important;
            background-size: 300% 100% !important;
            background-position: 0% 50% !important;
            -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 32'><polygon points='14,1.5 26,8 26,24 14,30.5 2,24 2,8' fill='none' stroke='%23000' stroke-width='3.5'/></svg>") !important;
                    mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 32'><polygon points='14,1.5 26,8 26,24 14,30.5 2,24 2,8' fill='none' stroke='%23000' stroke-width='3.5'/></svg>") !important;
            -webkit-mask-size: var(--hex-size) calc(var(--hex-size) * 1.14) !important;
                    mask-size: var(--hex-size) calc(var(--hex-size) * 1.14) !important;
            -webkit-mask-repeat: repeat !important;
                    mask-repeat: repeat !important;
            mix-blend-mode: normal !important;
            opacity: 0 !important;
            animation: none !important;
            transition: opacity 0.30s ease !important;
        }
        /* Inactive .pretty on hover — VERY, VERY little hex glow.
           Opacity 0.15, slower animations, heavily desaturated.
           The hex outlines are barely perceptible — just a quiet
           hint of life on the surface. */
        body.polish #app_academia .pretty:not(:has(+ div:not([style*="display: none"]))):hover::before {
            opacity: 0.15 !important;
            animation:
                tt-hex-sweep      4.5s linear infinite,
                tt-hex-hue-cycle  6.0s linear infinite !important;
            filter: saturate(0.45) brightness(1.02);
        }
        /* Inactive .pretty on hover — minimal lift, neutral border
           accent, no rotating rainbow. */
        body.polish #app_academia .pretty:not(:has(+ div:not([style*="display: none"]))):hover {
            background: linear-gradient(135deg,
                rgba(255,255,255,0.97) 0%,
                rgba(248,250,255,0.93) 100%) !important;
            border: 1px solid rgba(160,175,200,0.75) !important;
            backdrop-filter: blur(6px) saturate(135%) !important;
            -webkit-backdrop-filter: blur(6px) saturate(135%) !important;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.95),
                0 1px 3px rgba(15,20,40,0.10) !important;
            transform: translateY(-1px) !important;
        }
        /* EXPANDED (active) row — SAME white liquid-glass surface as
           inactive rows. ONLY the border colour changes to indigo.
           CRITICAL: bottom border is set to TRANSPARENT so there's
           no horizontal divider line where the body meets the header
           — the body's indigo left/right/bottom borders pick up
           seamlessly from the header's indigo top/left/right.
           Together the two pieces form one unbroken indigo outline
           around the entire expanded card. */
        body.polish #app_academia .pretty:has(+ div:not([style*="display: none"])) {
            background: linear-gradient(135deg,
                rgba(255,255,255,0.94) 0%,
                rgba(248,250,255,0.90) 100%) !important;
            border-top:    1px solid rgba(99, 102, 241, 0.85) !important;
            border-left:   1px solid rgba(99, 102, 241, 0.85) !important;
            border-right:  1px solid rgba(99, 102, 241, 0.85) !important;
            border-bottom: 1px solid transparent           !important;
            border-bottom-left-radius:  0 !important;
            border-bottom-right-radius: 0 !important;
            backdrop-filter: blur(6px) saturate(130%) !important;
            -webkit-backdrop-filter: blur(6px) saturate(130%) !important;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 1px 3px rgba(15,20,40,0.08) !important;
            /* Negative bottom margin equal to the body's top border
               width (which is 0) — header and body sit flush so the
               left/right indigo borders are continuous across the
               seam. margin: 0 is the default but we enforce it. */
            margin-bottom: 0 !important;
        }
        /* Body div also clamped flush to the top of its sibling header. */
        body.polish #app_academia .pretty:has(+ div:not([style*="display: none"])) + div {
            margin-top: 0 !important;
        }
        /* EXPANDED row on hover — same very-subtle hex shimmer as
           inactive (no themed family), just slightly stronger border. */
        body.polish #app_academia .pretty:has(+ div:not([style*="display: none"])):hover::before {
            opacity: 0.15 !important;
            animation:
                tt-hex-sweep      4.5s linear infinite,
                tt-hex-hue-cycle  6.0s linear infinite !important;
            filter: saturate(0.45) brightness(1.02);
        }
        body.polish #app_academia .pretty:has(+ div:not([style*="display: none"])):hover {
            border: 1px solid rgba(99, 102, 241, 1.00) !important;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.95),
                0 1px 3px rgba(15,20,40,0.10) !important;
        }
        /* When expanded, flatten the button's bottom corners so it
           visually merges into the body card below. */
        body.polish #app_academia .pretty:has(+ div:not([style*="display: none"])) {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom-color: transparent;
        }

        /* The EXPANDED body sits directly under the row header
           button. Its INDIGO border continues directly from the
           expanded header's indigo border so the two pieces read
           as one continuous outlined card. `border-top: none` lets
           the header's bottom edge act as the divider line between
           header and body. */
        body.polish #app_academia .pretty + div {
            background: linear-gradient(135deg,
                rgba(255,255,255,0.96) 0%,
                rgba(248,250,255,0.92) 100%);
            backdrop-filter: blur(8px) saturate(140%);
            -webkit-backdrop-filter: blur(8px) saturate(140%);
            border: 1px solid rgba(99, 102, 241, 0.85);    /* indigo — matches active row */
            border-top: none;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow:
                0 1px 0 rgba(255,255,255,1.00) inset,
                0 4px 14px rgba(0,0,0,0.06),
                0 1px 4px rgba(0,0,0,0.04);
            padding: 14px 18px 16px;
            margin-bottom: 6px;
        }
        /* Disable hex pseudo-elements on the expanded body so the
           pattern/glow doesn't bleed into the row contents. */
        body.polish #app_academia .pretty + div::before,
        body.polish #app_academia .pretty + div::after {
            content: none !important;
            display: none !important;
        }
        body.polish #app_academia .pretty + div ul {
            margin: 8px 0 0;
            padding-left: 22px;
        }
        body.polish #app_academia .pretty + div ul li {
            line-height: 1.55;
            color: rgba(10,10,25,0.85);
        }
    </style>
