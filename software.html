<!DOCTYPE html>
<html>
<head>
    <!--    Metadata imports-->
    <link rel="icon" type="image/gif/png" href="https://d3dw5jtb3w1kgy.cloudfront.net/logo.png">
    <title>Masrik Dahir</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--    CSS imports-->
    <link rel="stylesheet" href="library/www.w3schools.com.w3css.4.w3.css">
    <link rel="stylesheet" href="library/cdnjs.cloudflare.com.ajax.libs.font-awesome.4.7.0.css.font-awesome.min.css">

    <link rel="stylesheet" href="css/icons.css">
    <link rel="stylesheet" href="css/box.css">
    <link rel="stylesheet" href="css/default.css">
    <link rel="stylesheet" href="css/glowing.css">
    <link rel="stylesheet" href="css/new.css">
    <link rel="stylesheet" href="css/if.css">
    <link rel="stylesheet" href="css/popup.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="bootstrap/css/bootstrap-grid.css"/>
    <link rel="stylesheet" href="css/vintage.css">



    <!--    JS imports-->
    <script src="library/code.jquery.com.jquery-1.10.2.js"></script>
    <script src="js/icon-animation.js"></script>
    <script src="js/hourglass.js"></script>
    <script src="js/expand_jquery.js"></script>
    <script src="js/briefcase.js" defer></script>
    <script src='js/aesthetics.js' crossorigin='anonymous'></script>
    <script src="js/components.js" defer></script>

    <!--    Vue JS imports-->
    <script src="library/vue@3.2.36.dist.vue.global.js"></script>
    <script src="vueJs/default.js" defer></script>
    <script src="vueJs/software.js" defer></script>

    <!--    Top Nav -->
    <script src="library/ajax.googleapis.com.ajax.libs.jquery.3.6.0.jquery.min.js"></script>
    <script src="library/maxcdn.bootstrapcdn.com.bootstrap.3.4.1.js.bootstrap.min.js"></script>

    <!--   Info Tooltip -->
    <link rel="stylesheet" href="css/d.css">
    <script src="bootstrap/js/ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="bootstrap/js/maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="bootstrap/js/random.js" defer></script>

</head>

<body class="w3-white">
<div id="nav-placeholder"></div>


<!-- Page Container -->
<div class="w3-content" style="max-width: min(1800px, 95%); background-color: white; margin: 0 auto; padding: 1px;">
    <div id="app_software">
        <div class="">
            <div class="">
                <div class="row" style="margin-bottom: 10px; margin-top: 15px">
                    <div class="form-control search-wrapper panel-heading col-sm-12" type="text" v-model="searchQuery" placeholder="Search">
                        <center>
                            <div class="">
                            </div>
                            <div class="search_bar" style="display: flex; align-items: center;">
                                <img src="https://d3dw5jtb3w1kgy.cloudfront.net/Search.png" width="25" style="margin-left: 8px;margin-right: 8px">
                                <div style="display: flex; align-items: center; width: 100%;">
                                    <input class="search_searchbar" type="text" title="Search" v-model="searchQuery" placeholder="Search" style="flex-grow: 1; width: 100%; height: calc(1vw + 25px); min-height: 40px; max-height: 60px; padding-right: 40px;">
                                    <button @click="searchQuery = ''" style="margin-left: 40px; background: transparent; border: none; cursor: pointer;">
                                        ✖️
                                    </button>
                                </div>
                            </div>
                            <div class="search_buttons">
                            </div>
                        </center>
                    </div>
                </div>
                <div class="table-responsive" style="margin-right: 20px; caret-color: transparent;">
                    <div v-if="resources.length" class="table">
                        <div v-for="item in resultQuery">
                            <!--                            <td><a v-bind:href="item.uri" target="_blank">{{item.title}} {{item.des}}</a></td>-->
                            <button class="glow-on-hover3 Blazing" type="button"
                                    style="margin: min(calc(1px + 2vw), 10px); padding-left: 15px">
                                <TABLE WIDTH="100%">
                                    <TR>
                                        <TD WIDTH="80%">
                                            <a v-bind:href="item.uri" target="_blank" style="text-decoration: none">
                                                <h2><b style="color: black">
                                                    <div class="wrapper">
                                                    </div>
                                                    {{item.title}}</b>
                                                    <b class="color w3-text-teal;" style="float: right; color:DarkSlateGray;">
                                                        <bdi style="font-size: calc(10px + .5vw);"></bdi>
                                                    </b></h2>
                                                <p style="font-size: 15px">{{item.des}}</p>

                                            </a>
                                        </TD>

                                        <!--       Windows      -->
                                        <TD WIDTH="5%" v-if="item.uri_windows !== '' ">
                                            <a v-bind:href="item.uri_windows" target="_blank"><i
                                                    style="font-size: calc(20px + 1vw)"
                                                    class="fab fa-windows w3-hover-opacity">&#160&#160</i></a>
                                        </TD>

                                        <!--       Mac     -->
                                        <TD WIDTH="5%" v-if="item.uri_apple !== '' ">
                                            <a v-bind:href="item.uri_apple" target="_blank"><i
                                                    style="font-size: calc(20px + 1vw)"
                                                    class="fab fa-apple w3-hover-opacity">&#160&#160</i></a>
                                        </TD>

                                        <!--       Android     -->
                                        <TD WIDTH="5%" v-if="item.uri_android !== '' ">
                                            <a v-bind:href="item.uri_android" target="_blank"><i
                                                    style="font-size: calc(20px + 1vw)"
                                                    class="fab fa-google-play w3-hover-opacity">&#160&#160</i></a>
                                        </TD>

                                        <!--       Web     -->
                                        <TD WIDTH="5%" v-if="item.uri_web !== '' ">
                                            <a v-bind:href="item.uri_web" target="_blank"><i
                                                    style="font-size: calc(20px + 1vw)"
                                                    class="w3-hover-opacity">
                                                <img style="width: calc(20px + 1vw); height:calc(20px + 1vw); margin-bottom: 8px;" src="https://d3dw5jtb3w1kgy.cloudfront.net/Icons/www2.png"
                                                />


                                            </i></a>
                                        </TD>

                                        <!--       GitHub     -->
                                        <TD WIDTH="5%" v-if="item.uri_github !== '' ">
                                            <a v-bind:href="item.uri_github" target="_blank"><i
                                                    style="font-size: calc(20px + 1vw)"
                                                    class="fab fa-github w3-hover-opacity">&#160&#160</i></a>
                                        </TD>


                                    </TR>
                                </TABLE>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <!-- End Page Container -->
</div>

<div id="footer-placeholder"></div>
</body>
</html>
