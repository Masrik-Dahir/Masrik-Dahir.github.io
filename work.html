<!DOCTYPE html>
<html style="caret-color: transparent;">
<head>
    <!--    Metadata imports-->
    <link rel="icon" type="image/gif/png" href="https://d3dw5jtb3w1kgy.cloudfront.net/logo.png">
    <title>Masrik Dahir</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--    CSS imports-->
    <link rel="stylesheet" href="css/vendor/www.w3schools.com.w3css.4.w3.css">
    <link rel="stylesheet" href="css/vendor/cdnjs.cloudflare.com.ajax.libs.font-awesome.4.7.0.css.font-awesome.min.css">

    <link rel="stylesheet" href="css/icons.css">
    <link rel="stylesheet" href="css/box.css">
    <link rel="stylesheet" href="css/default.css">
    <link rel="stylesheet" href="css/glowing.css">
    <link rel="stylesheet" href="css/new.css">
    <link rel="stylesheet" href="css/if.css">
    <link rel="stylesheet" href="css/popup.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/vendor/bootstrap-grid.css"/>
    <link rel="stylesheet" href="css/vintage.css">

    <!--    Site-wide loader + polish + animations -->
    <link rel="stylesheet" href="css/eagle-loader.css">
    <link rel="stylesheet" href="css/polish.css">
    <link rel="stylesheet" href="css/work-symbols.css?v=7">
    <link rel="stylesheet" href="css/animations.css">


    <!--    JS imports-->
    <script src="js/vendor/code.jquery.com.jquery-1.10.2.js"></script>
    <script src="js/icon-animation.js"></script>
    <script src="js/hourglass.js"></script>
    <script src="js/expand_jquery.js"></script>
    <script src="js/briefcase.js" defer></script>
    <script src='js/aesthetics.js' crossorigin='anonymous'></script>

    <!--    Vue JS imports-->
    <script src="js/vendor/vue@3.2.36.dist.vue.global.js"></script>
    <script src="vueJs/default.js" defer></script>
    <script src="vueJs/work.js" defer></script>
    <script src="js/components.js" defer></script>

    <!--    Top Nav -->
    <script src="js/vendor/ajax.googleapis.com.ajax.libs.jquery.3.6.0.jquery.min.js"></script>
    <script src="js/vendor/maxcdn.bootstrapcdn.com.bootstrap.3.4.1.js.bootstrap.min.js"></script>

    <!--   Info Tooltip -->
    <link rel="stylesheet" href="css/d.css">
    <script src="js/vendor/jquery-3.6.1.min.js"></script>
    <script src="js/vendor/bootstrap-tooltip-3.4.1.min.js"></script>
    <script src="js/random.js" defer></script>

    <!--    Site-wide loader + animations + page graphics -->
    <script src="js/eagle-loader.js" defer></script>
    <script src="js/animations.js" defer></script>
    <script src="js/page-graphics.js" defer></script>

</head>

<body class="w3-white polish" data-page-graphics="aurora" style="">
<div id="nav-placeholder"></div>

<!-- Page Container -->
<div  class="w3-content w3-margin-top" style="max-width: min(1800px, 95%); background-color: white">

    <!-- The Grid -->
        <h4 class="w3-container w3-margin-top" style="margin-bottom: 10px;" >
            <b>
                <a class="btn1">
                    <img type="button" id="mymapshowButton" class="btn btn-outline-primary pop-up-button" style="width: calc(1% + 45px); height:calc(1% + 45px); margin: 1px; float: right; border: 1px solid black" src="https://d3dw5jtb3w1kgy.cloudfront.net/Icons/collapse.png"
                         />
                </a>
                <a class="btn2">
                    <img type="button" id="mymaphideButton"  class="btn btn-outline-primary pop-up-button" style="width: calc(1% + 45px); height:calc(1% + 45px); margin: 1px; float: right; border: 1px solid red; background: lightcoral" src="https://d3dw5jtb3w1kgy.cloudfront.net/Icons/extend.png"
                         />
                </a>
            </b>
        </h4>


        <div id="app_work" v-cloak>
        <div v-for="(job, index) in jobs" :key="index">
            <div class="w3-container w3-card" style="background-color: white">
                <h4>
                    <b style="color: black; font-size: calc(20px + .2vw);" v-html="job.title"></b>
                    <bdi v-if="windowWidth >= 1200">
                        <b style="float: right; color:crimson;">
                            <bdi style="font-size: calc(10px + .5vw);">
                                {{ job.dateStart }} -
                                <span v-if="job.isPresent" style="background-color: crimson; color:white; padding: 2px">Present</span>
                                <span v-else>{{ job.dateEnd }}</span>
                            </bdi>
                        </b>
                    </bdi>
                </h4>
                <ul>
                    <table width="100%">
                        <tr>
                            <td width="96%" style="color:transparent;display: flex; flex-wrap: wrap;margin-left: 10px; margin-top: 10px">
                                <div data-toggle="tooltip" data-html="true" :title="job.companyName" style="margin-right: 50px">
                                    <a :href="job.companyUrl" target="_blank" style="text-decoration: none;">
                                        <img :src="job.logoUrl" :style="job.logoStyle" alt="Masrik Dahir"/>
                                        <bdi v-if="job.companyText" style="color: black">{{ job.companyText }}</bdi>
                                    </a>
                                </div>
                            </td>
                            <td v-if="job.badges.length && windowWidth >= 1200" style="color:transparent; text-align: right;">
                                <div style="display: flex; justify-content: flex-end; align-items: center;">
                                    <div v-for="badge in job.badges" :key="badge.title" data-toggle="tooltip" data-html="true" :title="badge.title" style="margin-right: 20px; margin-top: 10px">
                                        <a :href="badge.url" target="_blank">
                                            <img class="box2 w3-hover-opacity" :src="badge.img" style="width: calc(1vw + 20px); min-width: 50px; margin-left: calc(0% + -20px)" alt="Masrik Dahir"/>
                                        </a>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </table>
                    <div v-if="job.badges.length && windowWidth < 1200" style="color:transparent;display: flex; flex-wrap: wrap;margin-left: 10px; margin-top: 15px">
                        <div v-for="badge in job.badges" :key="badge.title" data-toggle="tooltip" data-html="true" :title="badge.title" style="margin-right: 20px; margin-top: 10px">
                            <a :href="badge.url" target="_blank">
                                <img class="box2 w3-hover-opacity" :src="badge.img" style="width: calc(1vw + 20px); min-width: 50px; margin-left: calc(0% + -20px)" alt="Masrik Dahir"/>
                            </a>
                        </div>
                    </div>
                </ul>
                <p1>
                    <ul>
                        <bdi v-if="windowWidth < 1200">
                            <li class="color w3-text-teal;">
                                <bdi>{{ job.dateStart }} - {{ job.isPresent ? 'Present' : job.dateEnd }}</bdi>
                            </li>
                        </bdi>
                        <template v-for="(bullet, i) in job.bullets" :key="i">
                            <hr v-if="bullet === '---'"/>
                            <li v-else v-html="bullet"></li>
                        </template>
                    </ul>
                </p1>
                <hr>
            </div>
            <br>
        </div>
        </div>

    <br>

    <!-- End Page Container -->
</div>
<script>
    const mymaphideButton = document.getElementById('mymaphideButton');
    const mymapshowButton = document.getElementById('mymapshowButton');



    mymaphideButton.addEventListener('click', () => {

        mymaphideButton.classList.add('active');
        mymapshowButton.classList.remove('active');
        mymaphideButton.style.border = "1px solid red";
        mymaphideButton.style.background = "lightcoral";
        mymapshowButton.style.background = "white";
        mymapshowButton.style.border = "1px solid black";

    });

    mymapshowButton.addEventListener('click', () => {
        mymapshowButton.classList.add('active');
        mymaphideButton.classList.remove('active');
        mymaphideButton.style.border = "1px solid black";
        mymapshowButton.style.border = "1px solid red";
        mymapshowButton.style.background = "lightcoral";
        mymaphideButton.style.background = "white";


    });
</script>
<div id="footer-placeholder"></div>
</body>

</html>
